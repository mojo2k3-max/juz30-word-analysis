  background: var(--green-light);
  border-radius: 50%;
}

.word-token.mastered::after {

.panel-header {

  justify-content: space-between;
  align-items: center;

}

.panel-close {

}

.panel-close:hover { background: rgba(255,255,255,0.2); }

.panel-word-display {

.panel-word-translit {

.section-title {

}

.section-title-arabic {

}

.info-row {

.derivation-step {

.synonym-tag {

.synonym-arabic {

.dict-entry {

.panel-study-btns {

.stat-card {

.quiz-card {

.quiz-score {

.quiz-next-btn {

.quiz-next-btn:hover { background: var(--green-medium); }

.welcome {

  padding: 60px 24px;
}

  color: var(--green-dark);

  border-radius: 3px;

}

// ==================== REACT COMPONENTS ====================

function App() {
  const [selectedSurah, setSelectedSurah] = useState(null);
  const [selectedWord, setSelectedWord] = useState(null);
  const [selectedWordAyah, setSelectedWordAyah] = useState(null);
  const [studiedWords, setStudiedWords] = useState(() => {
    try { return new Set(JSON.parse(localStorage.getItem('juz30_studied') || '[]')); } catch(e) { return new Set(); }
  });
  const [masteredWords, setMasteredWords] = useState(() => {
    try { return new Set(JSON.parse(localStorage.getItem('juz30_mastered') || '[]')); } catch(e) { return new Set(); }
  });
  const [searchQuery, setSearchQuery] = useState('');
  const [view, setView] = useState('browse'); // browse, dashboard, quiz
  const [panelOpen, setPanelOpen] = useState(false);

  useEffect(() => {
    localStorage.setItem('juz30_studied', JSON.stringify([...studiedWords]));
  }, [studiedWords]);

  useEffect(() => {
    localStorage.setItem('juz30_mastered', JSON.stringify([...masteredWords]));
  }, [masteredWords]);

  const getWordKey = (surahNum, ayahNum, wordIdx) => `${surahNum}:${ayahNum}:${wordIdx}`;

  const handleWordClick = (word, ayah, surahNum) => {
    setSelectedWord({...word, surahNum, ayahNum: ayah.ayah_number});
    setSelectedWordAyah(ayah);
    setPanelOpen(true);
  };

  const handleClosePanel = () => {
    setPanelOpen(false);
    setSelectedWord(null);
  };

  const toggleStudied = (key) => {
    setStudiedWords(prev => {
      const next = new Set(prev);
      if (next.has(key)) next.delete(key); else next.add(key);
      return next;
    });
  };

  const toggleMastered = (key) => {
    setMasteredWords(prev => {
      const next = new Set(prev);
      if (next.has(key)) next.delete(key); else next.add(key);
      return next;
    });
  };

  const surahData = selectedSurah ? SURAH_DETAIL[selectedSurah] : null;

  const getProgress = (surahNum) => {
    const data = SURAH_DETAIL[surahNum];
    if (!data) return { total: 0, studied: 0, mastered: 0 };
    let total = 0, studied = 0, mastered = 0;
    data.ayahs.forEach(a => {
      a.words.forEach((w, wi) => {
        total++;
        const key = getWordKey(surahNum, a.ayah_number, wi);
        if (masteredWords.has(key)) mastered++;
        else if (studiedWords.has(key)) studied++;
      });
    });
    return { total, studied, mastered };
  };

  // Search results
  const searchResults = useMemo(() => {
    if (!searchQuery || searchQuery.length < 2) return [];
    const q = searchQuery.toLowerCase();
    const results = [];
    Object.values(SURAH_DETAIL).forEach(surah => {
      surah.ayahs.forEach(ayah => {
        ayah.words.forEach((word, wi) => {
          if (
            word.arabic.includes(searchQuery) ||
            word.transliteration.toLowerCase().includes(q) ||
            word.contextual_meaning.toLowerCase().includes(q) ||
            (word.root_letters && word.root_letters.includes(searchQuery))
          ) {
            results.push({ word, ayah, surah, wordIndex: wi });
          }
        });
      });
    });
    return results.slice(0, 20);
  }, [searchQuery]);

  return (
    <div className="app-container">
      <Sidebar
        surahs={ALL_SURAHS}
        selectedSurah={selectedSurah}
        onSelectSurah={(n) => { setSelectedSurah(n); setView('browse'); handleClosePanel(); }}
        searchQuery={searchQuery}
        onSearchChange={setSearchQuery}
        getProgress={getProgress}
        view={view}
        onViewChange={setView}
      />

      <div className={`main-content ${panelOpen ? 'panel-open' : ''}`}>
        <TopBar
          selectedSurah={selectedSurah}
          surahData={surahData}
          view={view}
          onViewChange={setView}
          onHome={() => { setSelectedSurah(null); setView('browse'); handleClosePanel(); }}
        />

        {searchQuery.length >= 2 && searchResults.length > 0 ? (
          <SearchResults
            results={searchResults}
            onSelectWord={(r) => {
              setSelectedSurah(r.surah.surah_number);
              handleWordClick(r.word, r.ayah, r.surah.surah_number);
              setSearchQuery('');
            }}
          />
        ) : view === 'dashboard' ? (
          <Dashboard
            surahs={ALL_SURAHS}
            getProgress={getProgress}
            studiedWords={studiedWords}
            masteredWords={masteredWords}
          />
        ) : view === 'quiz' ? (
          <QuizMode
            studiedWords={studiedWords}
            masteredWords={masteredWords}
          />
        ) : !selectedSurah ? (
          <Welcome onSelectSurah={(n) => { setSelectedSurah(n); setView('browse'); }} />
        ) : surahData ? (
          <SurahView
            surahData={surahData}
            onWordClick={handleWordClick}
            selectedWord={selectedWord}
            studiedWords={studiedWords}
            masteredWords={masteredWords}
            getWordKey={getWordKey}
          />
        ) : (
          <div style={{padding:'60px 24px',textAlign:'center'}}>
            <p style={{fontSize:'1.1rem',color:'var(--text-medium)'}}>
              Data for this surah is coming soon. Currently, full word analysis is available for:
            </p>
            <div style={{marginTop:16,display:'flex',gap:12,justifyContent:'center',flexWrap:'wrap'}}>
              {ALL_SURAHS.filter(s=>s.hasData).map(s => (
                <button key={s.n} onClick={() => setSelectedSurah(s.n)}
                  style={{padding:'10px 20px',background:'var(--green-primary)',color:'white',border:'none',borderRadius:8,cursor:'pointer',fontSize:'0.95rem'}}>
                  {s.tr} ({s.ar})
                </button>
              ))}
            </div>
          </div>
        )}
      </div>

      <AnalysisPanel
        word={selectedWord}
        ayah={selectedWordAyah}
        open={panelOpen}
        onClose={handleClosePanel}
        studiedWords={studiedWords}
        masteredWords={masteredWords}
        toggleStudied={toggleStudied}
        toggleMastered={toggleMastered}
        getWordKey={getWordKey}
      />
    </div>
  );
}

function Sidebar({ surahs, selectedSurah, onSelectSurah, searchQuery, onSearchChange, getProgress, view, onViewChange }) {
  return (
    <div className="sidebar">
      <div className="sidebar-header">
        <h1>جزء عمّ</h1>
        <p>Juz 30 Word Analysis</p>
      </div>
      <div className="sidebar-search">
        <input
          type="text"
          placeholder="Search words, roots, meanings..."
          value={searchQuery}
          onChange={e => onSearchChange(e.target.value)}
          dir="auto"
        />
      </div>
      <div className="sidebar-nav-buttons">
        <button className={`sidebar-nav-btn ${view==='browse'?'active':''}`} onClick={() => onViewChange('browse')}>Browse</button>
        <button className={`sidebar-nav-btn ${view==='dashboard'?'active':''}`} onClick={() => onViewChange('dashboard')}>Progress</button>
        <button className={`sidebar-nav-btn ${view==='quiz'?'active':''}`} onClick={() => onViewChange('quiz')}>Quiz</button>
      </div>
      <div className="sidebar-nav">
        {surahs.map(s => {
          const prog = getProgress(s.n);
          const pct = prog.total > 0 ? Math.round(((prog.studied + prog.mastered) / prog.total) * 100) : 0;
          return (
            <div
              key={s.n}
              className={`surah-item ${selectedSurah === s.n ? 'active' : ''} ${!s.hasData ? 'no-data' : ''}`}
              onClick={() => onSelectSurah(s.n)}
            >
              <div className="surah-number">{s.n}</div>
              <div className="surah-info">
                <div className="surah-arabic">{s.ar}</div>
                <div className="surah-english">{s.tr} &middot; {s.ayahs} ayahs {!s.hasData && <span className="coming-soon">coming soon</span>}</div>
              </div>
              {s.hasData && (
                <div className="surah-progress-bar">
                  <div className="surah-progress-fill" style={{width: pct + '%'}}></div>
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function TopBar({ selectedSurah, surahData, view, onViewChange, onHome }) {
  return (
    <div className="top-bar">
      <div className="breadcrumb">
        <span className="breadcrumb-link" onClick={onHome}>Juz 30</span>
        {selectedSurah && surahData && (
          <>
            <span className="breadcrumb-sep">/</span>
            <span>{surahData.surah_name_transliteration}</span>
          </>
        )}
        {view === 'dashboard' && <><span className="breadcrumb-sep">/</span><span>Progress Dashboard</span></>}
        {view === 'quiz' && <><span className="breadcrumb-sep">/</span><span>Quiz Mode</span></>}
      </div>
      <div className="top-bar-actions">
        <button className="action-btn" onClick={() => window.print()} title="Print current view">
          Print
        </button>
      </div>
    </div>
  );
}

          <h3>Root & Pattern</h3>

        <div className="feature-card">

function SurahView({ surahData, onWordClick, selectedWord, studiedWords, masteredWords, getWordKey }) {
  return (
    <div>
      <div className="surah-header">
        {surahData.surah_number !== 1 && surahData.surah_number !== 9 && (
          <div className="bismillah">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</div>
        )}
        <div className="surah-title-arabic">{surahData.surah_name_arabic}</div>
        <div className="surah-title-english">
          {surahData.surah_name_transliteration} — {surahData.surah_name_english}
        </div>
        <div className="surah-meta">
          Surah {surahData.surah_number} &middot; {surahData.total_ayahs} Ayahs
          {surahData.partial && <span style={{color:'var(--gold-dark)'}}> &middot; Showing first {surahData.loaded_ayahs} ayahs (demo)</span>}
        </div>
      </div>
      <div className="ayahs-container">
        {surahData.ayahs.map(ayah => (
          <div className="ayah-block" key={ayah.ayah_number}>
            <div className="ayah-arabic">
              {ayah.words.map((word, wi) => {
                const key = getWordKey(surahData.surah_number, ayah.ayah_number, wi);
                const isSelected = selectedWord && selectedWord.surahNum === surahData.surah_number
                  && selectedWord.ayahNum === ayah.ayah_number
                  && selectedWord.arabic === word.arabic
                  && selectedWord.transliteration === word.transliteration;
                let statusClass = '';
                if (masteredWords.has(key)) statusClass = 'mastered';
                else if (studiedWords.has(key)) statusClass = 'studied';
                return (
                  <React.Fragment key={wi}>
                    <span
                      className={`word-token ${isSelected ? 'selected' : ''} ${statusClass}`}
                      onClick={() => onWordClick(word, ayah, surahData.surah_number)}
                      title={word.contextual_meaning}
                    >
                      {word.arabic}
                    </span>
                    {' '}
                  </React.Fragment>
                );
              })}
              <span className="ayah-number-marker">{ayah.ayah_number}</span>
            </div>
            <div className="ayah-translation">
              {ayah.translation_usmani}
              <div className="translation-attr">Translation by Mufti Muhammad Taqi Usmani</div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function AnalysisPanel({ word, ayah, open, onClose, studiedWords, masteredWords, toggleStudied, toggleMastered, getWordKey }) {
  if (!word) return <div className={`analysis-panel ${open ? 'open' : ''}`}></div>;

  const wordKey = getWordKey(word.surahNum, word.ayahNum, 0);
  // Find exact word index
  let exactKey = wordKey;
  if (ayah) {
    const idx = ayah.words.findIndex(w => w.arabic === word.arabic && w.transliteration === word.transliteration);
    if (idx >= 0) exactKey = getWordKey(word.surahNum, word.ayahNum, idx);
  }

  const isStudied = studiedWords.has(exactKey);
  const isMastered = masteredWords.has(exactKey);

  return (
    <div className={`analysis-panel ${open ? 'open' : ''}`}>
      <div className="panel-header">
        <div>
          <div style={{fontSize:'0.75rem',opacity:0.8}}>Word Analysis</div>
          <div style={{fontSize:'0.85rem',fontFamily:'Amiri, serif'}}>{word.arabic}</div>
        </div>
        <button className="panel-close" onClick={onClose}>&times;</button>
      </div>

      <div className="panel-word-display">
        <div className="panel-word-arabic">{word.arabic}</div>
        <div className="panel-word-translit">{word.transliteration}</div>
        <div className="panel-word-meaning">{word.contextual_meaning}</div>
      </div>

      {/* Tafsir al-Jalalayn */}

        <div className="panel-section" style={{background:'#F1F8E9',borderBottom:'2px solid var(--green-light)'}}>
          <div className="section-title" style={{color:'var(--green-dark)'}}>
            Tafsir al-Jalalayn <span className="section-title-arabic">تفسير الجلالين</span>
          </div>
          <div style={{
            fontFamily:"'Amiri', serif",
            fontSize:'1.15rem',
            lineHeight:2,
            direction:'rtl',
            textAlign:'right',
            color:'var(--green-dark)',
            padding:'8px 12px',
            background:'white',
            borderRadius:8,
            border:'1px solid #C8E6C9'
          }}>
            <span style={{color:'var(--green-primary)',fontWeight:700}}>{'{'}{word.arabic}{'}'}</span>
            {' '}
            {word.tafsir_jalalayn}
          </div>
          <div style={{fontSize:'0.7rem',color:'var(--text-light)',marginTop:6,fontStyle:'italic'}}>
            Source: Tafsir al-Jalalayn — Jalal ad-Din al-Mahalli & Jalal ad-Din as-Suyuti
          </div>
        </div>
      )}

      {/* Part of Speech */}
      <div className="panel-section">
        <div className="section-title">
          Part of Speech <span className="section-title-arabic">إعراب</span>
        </div>
        <div className="info-row">
          <span className="info-label">Type:</span>
          <span className="info-value info-value-arabic">{word.part_of_speech}</span>
        </div>
        <div style={{fontSize:'0.88rem',lineHeight:1.6,color:'var(--text-dark)',marginTop:8}}>
          {word.detailed_pos}
        </div>
      </div>

      {/* Verb Details */}
      {word.verb_details && (
        <div className="panel-section">
          <div className="section-title">
            Verb Conjugation <span className="section-title-arabic">تصريف الفعل</span>
          </div>
          <div className="info-row">
            <span className="info-label">Tense:</span>
            <span className="info-value">{word.verb_details.tense}</span>
          </div>
          <div className="info-row">
            <span className="info-label">Voice:</span>
            <span className="info-value">{word.verb_details.voice}</span>
          </div>
          <div className="info-row">
            <span className="info-label">Person:</span>
            <span className="info-value">{word.verb_details.person}</span>
          </div>
          <div className="info-row">
            <span className="info-label">Form:</span>
            <span className="info-value">{word.verb_details.form}</span>
          </div>
          <div className="info-row">
            <span className="info-label">Base verb:</span>
            <span className="info-value info-value-arabic">{word.verb_details.base_verb}</span>
          </div>
        </div>
      )}

      {/* Root & Morphology */}
      <div className="panel-section">
        <div className="section-title">
          Root & Morphology <span className="section-title-arabic">الجذر والاشتقاق</span>
        </div>
        <div className="info-row">
          <span className="info-label">Root:</span>
          <span className="info-value info-value-arabic" style={{fontSize:'1.2rem',letterSpacing:'0.3em'}}>{word.root_letters}</span>
        </div>
        <div className="info-row">
          <span className="info-label">Pattern:</span>
          <span className="info-value info-value-arabic">{word.morphological_pattern}</span>
        </div>
        <div className="derivation-steps">
          <strong style={{color:'var(--green-primary)'}}>Derivation Steps:</strong>
          <div style={{marginTop:6}}>{word.derivation_explanation}</div>
        </div>
      </div>

      {/* Synonyms */}
      {word.synonyms && word.synonyms.length > 0 && (
        <div className="panel-section">
          <div className="section-title">
            Synonyms <span className="section-title-arabic">مترادفات</span>
          </div>
          <div style={{display:'flex',flexWrap:'wrap',gap:4}}>
            {word.synonyms.map((syn, si) => (
              <div key={si} className="synonym-tag">
                <span className="synonym-arabic">{syn.word}</span>
                <span style={{margin:'0 6px',color:'var(--text-light)'}}>—</span>
                <span>{syn.meaning}</span>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Dictionary */}
      <div className="panel-section">
        <div className="section-title">
          Dictionary <span className="section-title-arabic">القاموس</span>
        </div>
        <div className="dict-entry">
          <div className="dict-label">Al-Maany (المعاني الجامع)</div>
          <div className="dict-arabic">{word.al_maany_definition}</div>
        </div>
        <div className="dict-entry">
          <div className="dict-label">Hans Wehr (4th Ed.)</div>
          <div>{word.hans_wehr_definition}</div>
        </div>
      </div>

      {/* Full Ayah Translation */}
      {ayah && (
        <div className="panel-section" style={{background:'var(--gold-pale)'}}>
          <div className="section-title">Full Ayah Translation</div>
          <div style={{fontFamily:'Amiri, serif',fontSize:'1.3rem',direction:'rtl',textAlign:'right',marginBottom:8,color:'var(--green-dark)'}}>
            {ayah.arabic_text}
          </div>
          <div style={{fontSize:'0.9rem',lineHeight:1.6,direction:'ltr',textAlign:'left'}}>
            {ayah.translation_usmani}
          </div>
          <div className="translation-attr">Translation by Mufti Muhammad Taqi Usmani</div>
        </div>
      )}

      {/* Study Buttons */}
      <div className="panel-study-btns">
        <button
          className={`study-btn studied ${isStudied ? 'active' : ''}`}
          onClick={() => toggleStudied(exactKey)}
          style={isStudied ? {background:'var(--green-light)',color:'white'} : {}}
        >
          {isStudied ? 'Studied ✓' : 'Mark Studied'}
        </button>
        <button
          className={`study-btn mastered ${isMastered ? 'active' : ''}`}
          onClick={() => toggleMastered(exactKey)}
          style={isMastered ? {background:'var(--gold-primary)',color:'var(--green-dark)'} : {}}
        >
          {isMastered ? 'Mastered ★' : 'Mark Mastered'}
        </button>
      </div>
    </div>
  );
}

function SearchResults({ results, onSelectWord }) {
  return (
    <div style={{padding:24,maxWidth:900,margin:'0 auto'}}>
      <h3 style={{marginBottom:16,color:'var(--green-dark)'}}>Search Results ({results.length})</h3>
      {results.map((r, i) => (
        <div key={i}
          onClick={() => onSelectWord(r)}
          style={{
            display:'flex',alignItems:'center',gap:16,padding:'12px 16px',
            background:'white',borderRadius:8,border:'1px solid var(--border)',
            marginBottom:8,cursor:'pointer',transition:'box-shadow 0.2s'
          }}
          onMouseEnter={e => e.currentTarget.style.boxShadow='0 2px 8px rgba(0,0,0,0.08)'}
          onMouseLeave={e => e.currentTarget.style.boxShadow='none'}
        >
          <span style={{fontFamily:'Amiri, serif',fontSize:'1.5rem',direction:'rtl',minWidth:80,textAlign:'center',color:'var(--green-dark)'}}>
            {r.word.arabic}
          </span>
          <div>
            <div style={{fontSize:'0.85rem',fontWeight:600}}>{r.word.contextual_meaning}</div>
            <div style={{fontSize:'0.75rem',color:'var(--text-light)'}}>
              {r.surah.surah_name_transliteration} ({r.surah.surah_name_arabic}) — Ayah {r.ayah.ayah_number}
            </div>
            <div style={{fontSize:'0.75rem',color:'var(--text-light)'}}>
              Root: {r.word.root_letters} &middot; {r.word.transliteration}
            </div>
          </div>
        </div>
      ))}
    </div>
  );
}

function Dashboard({ surahs, getProgress, studiedWords, masteredWords }) {
  const availableSurahs = surahs.filter(s => s.hasData);
  let totalWords = 0, totalStudied = 0, totalMastered = 0;
  availableSurahs.forEach(s => {
    const p = getProgress(s.n);
    totalWords += p.total;
    totalStudied += p.studied;
    totalMastered += p.mastered;
  });

  return (
    <div className="dashboard">
      <h2>Progress Dashboard</h2>
      <div className="stats-grid">
        <div className="stat-card">
          <div className="stat-number">{totalWords}</div>
          <div className="stat-label">Total Words</div>
        </div>
        <div className="stat-card">
          <div className="stat-number" style={{color:'var(--green-light)'}}>{totalStudied}</div>
          <div className="stat-label">Studied</div>
        </div>
        <div className="stat-card">
          <div className="stat-number" style={{color:'var(--gold-dark)'}}>{totalMastered}</div>
          <div className="stat-label">Mastered</div>
        </div>
      </div>
      <h3 style={{marginBottom:12,fontSize:'1rem',color:'var(--text-medium)'}}>By Surah</h3>
      <div className="surah-progress-list">
        {availableSurahs.map(s => {
          const p = getProgress(s.n);
          const studiedPct = p.total > 0 ? (p.studied / p.total) * 100 : 0;
          const masteredPct = p.total > 0 ? (p.mastered / p.total) * 100 : 0;
          const totalPct = Math.round(studiedPct + masteredPct);
          return (
            <div className="progress-row" key={s.n}>
              <div className="progress-name">
                <span style={{fontFamily:'Amiri, serif',marginRight:8}}>{s.ar}</span>
                <span style={{fontSize:'0.78rem',color:'var(--text-light)'}}>{s.tr}</span>
              </div>
              <div className="progress-bar-outer">
                <div style={{display:'flex',height:'100%'}}>
                  <div className="progress-bar-inner progress-bar-mastered" style={{width: masteredPct + '%'}}></div>
                  <div className="progress-bar-inner progress-bar-studied" style={{width: studiedPct + '%'}}></div>
                </div>
              </div>
              <div className="progress-pct">{totalPct}%</div>
            </div>
          );
        })}
      </div>
      <div style={{marginTop:16,display:'flex',gap:16,fontSize:'0.8rem',color:'var(--text-light)'}}>
        <span><span style={{display:'inline-block',width:12,height:12,background:'var(--green-light)',borderRadius:2,marginRight:4,verticalAlign:'middle'}}></span> Studied</span>
        <span><span style={{display:'inline-block',width:12,height:12,background:'var(--gold-primary)',borderRadius:2,marginRight:4,verticalAlign:'middle'}}></span> Mastered</span>
      </div>
    </div>
  );
}

function QuizMode() {
  const [quizWords, setQuizWords] = useState([]);
  const [currentIdx, setCurrentIdx] = useState(0);
  const [selected, setSelected] = useState(null);
  const [score, setScore] = useState({correct:0, total:0});
  const [quizType, setQuizType] = useState('meaning');

  useEffect(() => {
    // Gather all words from available surahs
    const allWords = [];
    Object.values(SURAH_DETAIL).forEach(surah => {
      surah.ayahs.forEach(ayah => {
        ayah.words.forEach(word => {
          if (word.root_letters !== 'N/A' && word.contextual_meaning) {
            allWords.push(word);
          }
        });
      });
    });
    // Shuffle
    for (let i = allWords.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [allWords[i], allWords[j]] = [allWords[j], allWords[i]];
    }
    setQuizWords(allWords);
  }, []);

  if (quizWords.length === 0) return <div style={{padding:40,textAlign:'center',color:'var(--text-light)'}}>Loading quiz...</div>;

  const current = quizWords[currentIdx % quizWords.length];

  // Generate options
  const generateOptions = () => {
    let correctAnswer, getOption;
    if (quizType === 'meaning') {
      correctAnswer = current.contextual_meaning;
      getOption = w => w.contextual_meaning;
    } else if (quizType === 'root') {
      correctAnswer = current.root_letters;
      getOption = w => w.root_letters;
    } else {
      correctAnswer = current.part_of_speech;
      getOption = w => w.part_of_speech;
    }

    const otherOptions = quizWords
      .filter(w => getOption(w) !== correctAnswer && getOption(w) !== 'N/A')
      .map(w => getOption(w));
    const uniqueOthers = [...new Set(otherOptions)];
    const shuffled = uniqueOthers.sort(() => Math.random() - 0.5).slice(0, 3);
    const options = [...shuffled, correctAnswer].sort(() => Math.random() - 0.5);
    return { options, correctAnswer };
  };

  const { options, correctAnswer } = useMemo(() => generateOptions(), [currentIdx, quizType, quizWords]);

  const handleSelect = (opt) => {
    if (selected !== null) return;
    setSelected(opt);
    if (opt === correctAnswer) {
      setScore(s => ({correct: s.correct + 1, total: s.total + 1}));
    } else {
      setScore(s => ({...s, total: s.total + 1}));
    }
  };

  const handleNext = () => {
    setSelected(null);
    setCurrentIdx(i => i + 1);
  };

  const questionText = quizType === 'meaning'
    ? 'What is the contextual meaning of this word?'
    : quizType === 'root'
    ? 'What are the root letters of this word?'
    : 'What is the part of speech of this word?';

  return (
    <div className="quiz-container">
      <div style={{display:'flex',gap:8,marginBottom:20,justifyContent:'center'}}>
        {['meaning','root','pos'].map(t => (
          <button key={t}
            className={`action-btn ${quizType===t?'active':''}`}
            onClick={() => { setQuizType(t); setSelected(null); setCurrentIdx(0); setScore({correct:0,total:0}); }}
          >
            {t === 'meaning' ? 'Meaning' : t === 'root' ? 'Root Letters' : 'Part of Speech'}
          </button>
        ))}
      </div>
      <div className="quiz-card">
        <div className="quiz-word">{current.arabic}</div>
        <div style={{fontSize:'0.85rem',color:'var(--text-light)',marginBottom:4,fontStyle:'italic'}}>{current.transliteration}</div>
        <div className="quiz-question">{questionText}</div>
        <div className="quiz-options">
          {options.map((opt, i) => {
            let cls = 'quiz-option';
            if (selected !== null) {
              if (opt === correctAnswer) cls += ' correct';
              else if (opt === selected) cls += ' incorrect';
            }
            return (
              <div key={i} className={cls} onClick={() => handleSelect(opt)}
                style={quizType !== 'meaning' ? {fontFamily:'Amiri, serif',fontSize:'1.1rem',direction:'rtl',textAlign:'right'} : {}}>
                {opt}
              </div>
            );
          })}
        </div>
        {selected !== null && (
          <button className="quiz-next-btn" onClick={handleNext}>
            Next Word &rarr;
          </button>
        )}
        <div className="quiz-score">
          Score: {score.correct}/{score.total}
          {score.total > 0 && <span> ({Math.round((score.correct/score.total)*100)}%)</span>}
        </div>
      </div>
    </div>
  );
}
